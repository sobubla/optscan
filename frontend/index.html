<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPT.SCAN // NIFTY · BANKNIFTY</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0f;
    --bg-elev: #11161a;
    --bg-elev-2: #161c22;
    --line: #1f2630;
    --line-bright: #2a3340;
    --text: #d8dde3;
    --text-dim: #6b7785;
    --text-bright: #ffffff;
    --green: #00d68f;
    --red: #ff4757;
    --amber: #ffaa33;
    --blue: #4d8eff;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.4;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(77,142,255,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(0,214,143,0.03) 0%, transparent 50%);
    min-height: 100vh;
  }
  /* ===== HEADER ===== */
  header {
    border-bottom: 1px solid var(--line);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-elev);
    position: sticky; top: 0; z-index: 100;
  }
  .brand {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
    color: var(--text-bright);
  }
  .brand span { color: var(--green); }
  .status-row { display: flex; gap: 24px; align-items: center; font-size: 11px; color: var(--text-dim); }
  .live-pulse { display: inline-flex; align-items: center; gap: 6px; }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,214,143,0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(0,214,143,0); }
  }
  /* ===== MAIN GRID ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    min-height: calc(100vh - 51px);
  }
  .panel {
    background: var(--bg);
    padding: 16px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .panel-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    color: var(--text-bright);
  }
  .panel-spot {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--green);
  }
  /* ===== CONTEXT BLOCK ===== */
  .context-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
    padding: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
  }
  .ctx-cell { display: flex; flex-direction: column; gap: 2px; }
  .ctx-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .ctx-value { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .ctx-value.green { color: var(--green); }
  .ctx-value.red { color: var(--red); }
  .ctx-value.amber { color: var(--amber); }
  .ctx-value.dim { color: var(--text-dim); }
  /* ===== SETUPS ===== */
  .section-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 12px 0 6px;
    display: flex; justify-content: space-between;
  }
  .setup-card {
    border: 1px solid var(--line-bright);
    background: var(--bg-elev);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .setup-card:hover {
    border-color: var(--green);
    background: var(--bg-elev-2);
  }
  .setup-card.bullish { border-left: 3px solid var(--green); }
  .setup-card.bearish { border-left: 3px solid var(--red); }
  .setup-head {
    display: flex; justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .setup-strike {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--text-bright);
  }
  .setup-strike .type { font-size: 11px; padding: 2px 5px; margin-left: 4px; }
  .type.CE { background: rgba(0,214,143,0.15); color: var(--green); }
  .type.PE { background: rgba(255,71,87,0.15); color: var(--red); }
  .setup-ltp {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--amber);
    font-weight: 500;
  }
  .greeks-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    font-size: 10px;
    margin-bottom: 6px;
  }
  .greek { display: flex; flex-direction: column; gap: 1px; }
  .greek-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .greek-value { color: var(--text); }
  .reasons {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
  }
  .reasons span:not(:last-child)::after { content: " • "; color: var(--line-bright); }
  .targets {
    display: flex; gap: 12px;
    font-size: 11px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--line);
  }
  .targets .t-sl { color: var(--red); }
  .targets .t-target { color: var(--green); }
  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 24px 8px;
    font-size: 11px;
    border: 1px dashed var(--line);
    background: var(--bg-elev);
  }
  /* ===== EXIT ALERTS ===== */
  .exit-alerts-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    padding: 10px 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    overflow-x: auto;
    z-index: 90;
  }
  .exit-alerts-bar:empty { display: none; }
  .exit-alert {
    display: flex; gap: 8px; align-items: center;
    padding: 6px 12px;
    border: 1px solid var(--red);
    background: rgba(255,71,87,0.08);
    flex-shrink: 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } }
  .exit-alert.high { border-color: var(--amber); background: rgba(255,170,51,0.08); }
  .exit-alert.medium { border-color: var(--blue); background: rgba(77,142,255,0.06); }
  .alert-contract {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--text-bright);
  }
  .alert-msg { font-size: 11px; }
  .alert-pnl { font-weight: 700; }
  .alert-pnl.pos { color: var(--green); }
  .alert-pnl.neg { color: var(--red); }
  /* ===== POSITION TRACKER ===== */
  .positions-bar {
    background: var(--bg-elev);
    border-bottom: 1px solid var(--line);
    padding: 8px 20px;
    display: flex; gap: 12px;
    overflow-x: auto;
    font-size: 11px;
  }
  .pos-pill {
    display: flex; gap: 8px; align-items: center;
    padding: 4px 10px;
    border: 1px solid var(--line-bright);
    background: var(--bg-elev-2);
    flex-shrink: 0;
  }
  .pos-pnl { font-weight: 600; }
  /* ===== FOOTER STATS ===== */
  .footer-meta {
    display: flex;
    gap: 16px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .meta-item span { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="brand">OPT<span>.</span>SCAN</div>
  <nav>
    <a href="/" class="active">Scanner</a>
    <a href="/journal">Journal</a>
  </nav>
  <div class="status-row">
    <div class="live-pulse"><span class="pulse-dot"></span><span id="liveStatus">LIVE · scanning every 30s</span></div>
    <div class="footer-meta">
      <div class="meta-item">last scan <span id="lastScan">--:--:--</span></div>
      <div class="meta-item">setups today <span id="setupCount">0</span></div>
    </div>
  </div>
</header>

<div class="positions-bar" id="positionsBar"></div>

<main id="mainGrid">
  <div class="panel" data-index="NIFTY">
    <div class="panel-header">
      <div class="panel-title">NIFTY</div>
      <div class="panel-spot" data-spot>--</div>
    </div>
    <div class="context-grid" data-context></div>
    <div class="section-label"><span>SETUPS</span><span data-setup-count>0</span></div>
    <div data-setups></div>
  </div>

  <div class="panel" data-index="BANKNIFTY">
    <div class="panel-header">
      <div class="panel-title">BANKNIFTY</div>
      <div class="panel-spot" data-spot>--</div>
    </div>
    <div class="context-grid" data-context></div>
    <div class="section-label"><span>SETUPS</span><span data-setup-count>0</span></div>
    <div data-setups></div>
  </div>

</main>

<div class="exit-alerts-bar" id="exitAlerts"></div>

<script>
const API = window.location.origin;

function fmt(v, decimals = 2) {
  if (v == null || v === undefined) return '--';
  if (typeof v === 'number') return v.toFixed(decimals);
  return v;
}

function ivRegimeClass(regime) {
  return { cheap: 'green', expensive: 'red', neutral: 'amber' }[regime] || 'dim';
}

function renderContext(ctxEl, ctx) {
  if (!ctx) { ctxEl.innerHTML = ''; return; }
  ctxEl.innerHTML = `
    <div class="ctx-cell">
      <div class="ctx-label">IV Regime</div>
      <div class="ctx-value ${ivRegimeClass(ctx.iv_regime)}">${ctx.iv_regime || '--'} (${fmt(ctx.iv_percentile, 0)}%)</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">PCR</div>
      <div class="ctx-value ${ctx.pcr > 1.2 ? 'red' : ctx.pcr < 0.8 ? 'green' : ''}">${fmt(ctx.pcr)}</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">Max Pain</div>
      <div class="ctx-value">${ctx.max_pain || '--'}</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">OI Signal</div>
      <div class="ctx-value ${ctx.oi_signal?.signal === 'bullish' ? 'green' : ctx.oi_signal?.signal === 'bearish' ? 'red' : 'dim'}">${ctx.oi_signal?.signal || 'neutral'}</div>
    </div>
    <div class="ctx-cell" style="grid-column: 1 / -1;">
      <div class="ctx-label">TradingView</div>
      <div class="ctx-value ${ctx.tv_signal ? 'amber' : 'dim'}">${ctx.tv_signal || 'no recent signal'}</div>
    </div>
  `;
}

function renderSetups(setupsEl, setups) {
  if (!setups || setups.length === 0) {
    setupsEl.innerHTML = `<div class="empty">No qualifying setups · waiting for confluence</div>`;
    return;
  }
  setupsEl.innerHTML = setups.map(s => `
    <div class="setup-card ${s.direction}">
      <div class="setup-head">
        <div class="setup-strike">${s.strike}<span class="type ${s.type}">${s.type}</span></div>
        <div class="setup-ltp">₹${fmt(s.ltp)}</div>
      </div>
      <div class="greeks-row">
        <div class="greek"><div class="greek-label">Δ delta</div><div class="greek-value">${fmt(s.delta, 3)}</div></div>
        <div class="greek"><div class="greek-label">Γ gamma</div><div class="greek-value">${fmt(s.gamma, 4)}</div></div>
        <div class="greek"><div class="greek-label">Θ theta</div><div class="greek-value">${fmt(s.theta)}</div></div>
        <div class="greek"><div class="greek-label">IV</div><div class="greek-value">${fmt(s.iv)}%</div></div>
      </div>
      <div class="targets">
        <div class="t-sl">SL: ₹${fmt(s.suggested_sl)}</div>
        <div class="t-target">T1: ₹${fmt(s.suggested_target_1)}</div>
        <div class="t-target">T2: ₹${fmt(s.suggested_target_2)}</div>
      </div>
      <div class="reasons">${(s.reasons || []).map(r => `<span>${r}</span>`).join('')}</div>
    </div>
  `).join('');
}

async function refresh() {
  try {
    const res = await fetch(`${API}/api/scan`);
    const data = await res.json();
    let totalSetups = 0;

    document.querySelectorAll('.panel').forEach(panel => {
      const idx = panel.dataset.index;
      const scan = data[idx];
      if (!scan) return;

      panel.querySelector('[data-spot]').textContent = fmt(scan.spot, 0);
      renderContext(panel.querySelector('[data-context]'), scan.market_context);
      renderSetups(panel.querySelector('[data-setups]'), scan.setups);
      const count = (scan.setups || []).length;
      panel.querySelector('[data-setup-count]').textContent = count;
      totalSetups += count;
    });

    document.getElementById('setupCount').textContent = totalSetups;
    document.getElementById('lastScan').textContent = new Date().toLocaleTimeString();

    // positions
    const posRes = await fetch(`${API}/api/positions`);
    const positions = await posRes.json();
    const posBar = document.getElementById('positionsBar');
    if (!positions.length) {
      posBar.innerHTML = '<div style="color: var(--text-dim); font-size: 11px;">No open positions · register a trade via /api/position/add</div>';
    } else {
      posBar.innerHTML = positions.map(p => {
        const pnlPct = ((p.current_price - p.entry_price) / p.entry_price * 100).toFixed(1);
        const cls = pnlPct > 0 ? 'pos' : 'neg';
        return `<div class="pos-pill">
          <span><strong>${p.index}</strong> ${p.strike}${p.option_type}</span>
          <span style="color: var(--text-dim);">@ ₹${fmt(p.entry_price)}</span>
          <span class="pos-pnl ${cls}">${pnlPct > 0 ? '+' : ''}${pnlPct}%</span>
          <span style="color: var(--amber);">peak +${fmt(p.peak_pct, 1)}%</span>
          ${p.locked_profit_pct > 0 ? `<span style="color: var(--green);">🔒 +${p.locked_profit_pct}%</span>` : ''}
        </div>`;
      }).join('');
    }

    // exit alerts
    const alertsRes = await fetch(`${API}/api/exit-alerts`);
    const alerts = await alertsRes.json();
    const alertBar = document.getElementById('exitAlerts');
    alertBar.innerHTML = alerts.slice(-5).map(a => `
      <div class="exit-alert ${a.urgency}">
        <span class="alert-contract">${a.index} ${a.contract}</span>
        <span class="alert-pnl ${a.pnl_pct > 0 ? 'pos' : 'neg'}">${a.pnl_pct > 0 ? '+' : ''}${a.pnl_pct}%</span>
        <span class="alert-msg">${a.message}</span>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('liveStatus').textContent = 'OFFLINE · check server';
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
