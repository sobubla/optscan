<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPT.SCAN // NIFTY · BANKNIFTY</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0f;
    --bg-elev: #11161a;
    --bg-elev-2: #161c22;
    --line: #1f2630;
    --line-bright: #2a3340;
    --text: #d8dde3;
    --text-dim: #6b7785;
    --text-bright: #ffffff;
    --green: #00d68f;
    --red: #ff4757;
    --amber: #ffaa33;
    --blue: #4d8eff;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.4;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(77,142,255,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(0,214,143,0.03) 0%, transparent 50%);
    min-height: 100vh;
  }
  /* ===== HEADER ===== */
  header {
    border-bottom: 1px solid var(--line);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-elev);
    position: sticky; top: 0; z-index: 100;
  }
  .brand {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
    color: var(--text-bright);
  }
  .brand span { color: var(--green); }
  .status-row { display: flex; gap: 24px; align-items: center; font-size: 11px; color: var(--text-dim); }
  .live-pulse { display: inline-flex; align-items: center; gap: 6px; }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,214,143,0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(0,214,143,0); }
  }
  /* ===== MAIN GRID ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    min-height: calc(100vh - 51px);
  }
  .panel {
    background: var(--bg);
    padding: 16px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .panel-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    color: var(--text-bright);
  }
  .panel-spot {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--green);
  }
  /* ===== CONTEXT BLOCK ===== */
  .context-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
    padding: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
  }
  .ctx-cell { display: flex; flex-direction: column; gap: 2px; }
  .ctx-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .ctx-value { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .ctx-value.green { color: var(--green); }
  .ctx-value.red { color: var(--red); }
  .ctx-value.amber { color: var(--amber); }
  .ctx-value.dim { color: var(--text-dim); }
  /* ===== SETUPS ===== */
  .section-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 12px 0 6px;
    display: flex; justify-content: space-between;
  }
  .setup-card {
    border: 1px solid var(--line-bright);
    background: var(--bg-elev);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .setup-card:hover {
    border-color: var(--green);
    background: var(--bg-elev-2);
  }
  .setup-card.bullish { border-left: 3px solid var(--green); }
  .setup-card.bearish { border-left: 3px solid var(--red); }
  .setup-head {
    display: flex; justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .setup-strike {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--text-bright);
  }
  .setup-strike .type { font-size: 11px; padding: 2px 5px; margin-left: 4px; }
  .type.CE { background: rgba(0,214,143,0.15); color: var(--green); }
  .type.PE { background: rgba(255,71,87,0.15); color: var(--red); }
  .setup-ltp {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--amber);
    font-weight: 500;
  }
  .greeks-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    font-size: 10px;
    margin-bottom: 6px;
  }
  .greek { display: flex; flex-direction: column; gap: 1px; }
  .greek-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .greek-value { color: var(--text); }
  .reasons {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
  }
  .reasons span:not(:last-child)::after { content: " • "; color: var(--line-bright); }
  .targets {
    display: flex; gap: 12px;
    font-size: 11px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--line);
  }
  .targets .t-sl { color: var(--red); }
  .targets .t-target { color: var(--green); }
  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 24px 8px;
    font-size: 11px;
    border: 1px dashed var(--line);
    background: var(--bg-elev);
  }
  /* ===== PANEL HEALTH STATES ===== */
  /* degraded — mirrors .conflict-card amber pattern */
  .empty.paused {
    border-color: var(--amber);
    background: rgba(255,170,51,0.06);
    color: var(--amber);
  }
  /* error — mirrors .exit-alert.critical red pattern */
  .empty.error-state {
    border-color: var(--red);
    background: rgba(255,71,87,0.06);
    color: var(--red);
  }
  /* pulse dot state variants */
  .pulse-dot.degraded { background: var(--amber); }
  .pulse-dot.error    { background: var(--red); }
  /* ===== EXIT ALERTS ===== */
  .exit-alerts-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    padding: 10px 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    overflow-x: auto;
    z-index: 90;
  }
  .exit-alerts-bar:empty { display: none; }
  .exit-alert {
    display: flex; gap: 8px; align-items: center;
    padding: 6px 12px;
    border: 1px solid var(--red);
    background: rgba(255,71,87,0.08);
    flex-shrink: 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } }
  .exit-alert.critical { border-color: var(--red); background: rgba(255,71,87,0.15); box-shadow: 0 0 8px rgba(255,71,87,0.35); }
  .exit-alert.high { border-color: var(--amber); background: rgba(255,170,51,0.08); }
  .exit-alert.medium { border-color: var(--blue); background: rgba(77,142,255,0.06); }
  .alert-contract {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--text-bright);
  }
  .alert-msg { font-size: 11px; }
  .alert-pnl { font-weight: 700; }
  .alert-pnl.pos { color: var(--green); }
  .alert-pnl.neg { color: var(--red); }
  /* ===== POSITION TRACKER ===== */
  .positions-bar {
    background: var(--bg-elev);
    border-bottom: 1px solid var(--line);
    padding: 8px 20px;
    display: flex; gap: 12px;
    overflow-x: auto;
    font-size: 11px;
  }
  .pos-pill {
    display: flex; gap: 8px; align-items: center;
    padding: 4px 10px;
    border: 1px solid var(--line-bright);
    background: var(--bg-elev-2);
    flex-shrink: 0;
  }
  .pos-pnl { font-weight: 600; }
  /* ===== FOOTER STATS ===== */
  .footer-meta {
    display: flex;
    gap: 16px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .meta-item span { color: var(--text); }
  /* ===== SUGGESTION TRAY ===== */
  .suggestion-tray {
    background: var(--bg-elev);
    border-bottom: 2px solid var(--blue);
    padding: 12px 20px 14px;
  }
  .tray-section { margin-bottom: 14px; }
  .tray-section:last-child { margin-bottom: 0; }
  .tray-section-label {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .tray-count {
    background: var(--amber); color: var(--bg);
    font-size: 9px; font-weight: 700; padding: 1px 5px;
  }
  .suggestions-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 2px; }
  .suggestion-card {
    border: 1px solid var(--line-bright); background: var(--bg-elev-2);
    padding: 12px; min-width: 268px; flex-shrink: 0;
    animation: slideIn 0.3s ease;
  }
  .suggestion-card.bullish { border-left: 3px solid var(--green); }
  .suggestion-card.bearish { border-left: 3px solid var(--red); }
  .sug-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .sug-sym { font-weight: 700; color: var(--text-bright); font-size: 12px; letter-spacing: 0.02em; }
  .sug-regime {
    font-size: 9px; padding: 2px 6px;
    letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600;
  }
  .sug-regime.trending { background: rgba(77,142,255,0.15); color: var(--blue); }
  .sug-regime.ranging  { background: rgba(255,170,51,0.12); color: var(--amber); }
  .sug-time { font-size: 10px; color: var(--text-dim); }
  .sug-contract {
    font-size: 15px; font-weight: 700; color: var(--text-bright);
    margin-bottom: 8px; display: flex; align-items: baseline; gap: 6px;
  }
  .sug-expiry { font-size: 10px; font-weight: 400; color: var(--text-dim); }
  .sug-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--line); border: 1px solid var(--line);
    margin-bottom: 8px;
  }
  .sug-cell { display: flex; flex-direction: column; gap: 2px; padding: 6px 8px; background: var(--bg); }
  .sug-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .sug-value { font-size: 12px; font-weight: 600; color: var(--text); }
  .sug-value.entry  { color: var(--amber); }
  .sug-value.stop   { color: var(--red); }
  .sug-value.target { color: var(--green); }
  .sug-rationale {
    font-size: 10px; color: var(--text-dim);
    margin-bottom: 10px; line-height: 1.5;
    border-left: 2px solid var(--line-bright); padding-left: 6px;
  }
  .sug-actions { display: flex; gap: 6px; }
  .sug-approve {
    flex: 1; padding: 7px 0;
    background: rgba(0,214,143,0.10); color: var(--green);
    border: 1px solid var(--green);
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s;
  }
  .sug-approve:hover { background: rgba(0,214,143,0.22); }
  .sug-reject {
    flex: 1; padding: 7px 0;
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--line-bright);
    font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: all 0.15s;
  }
  .sug-reject:hover { border-color: var(--red); color: var(--red); }
  /* gate positions */
  .gate-positions-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .gate-pos-pill {
    display: flex; gap: 10px; align-items: center;
    padding: 5px 12px; border: 1px solid var(--line-bright);
    background: var(--bg-elev-2); font-size: 11px;
  }
  .gate-pos-pill.bullish { border-left: 2px solid var(--green); }
  .gate-pos-pill.bearish { border-left: 2px solid var(--red); }
  .gate-pos-held { color: var(--text-dim); font-size: 10px; }
  /* reversal conflict advisory */
  .conflict-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .conflict-card {
    display: flex; gap: 12px; align-items: center;
    padding: 9px 14px;
    border: 1px solid var(--amber); background: rgba(255,170,51,0.08);
    font-size: 11px; animation: slideIn 0.3s ease;
  }
  .conflict-badge {
    font-size: 9px; font-weight: 700; padding: 2px 7px;
    letter-spacing: 0.07em; text-transform: uppercase;
    border: 1px solid var(--amber); color: var(--amber); white-space: nowrap;
  }
  .conflict-body { display: flex; flex-direction: column; gap: 2px; }
  .conflict-title { color: var(--text-bright); font-weight: 600; }
  .conflict-detail { color: var(--text-dim); font-size: 10px; }
  /* exit suggestions */
  .exit-sug-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .exit-sug-card {
    display: flex; gap: 10px; align-items: center;
    padding: 7px 12px; border: 1px solid var(--amber);
    background: rgba(255,170,51,0.06); font-size: 11px;
    animation: slideIn 0.3s ease;
  }
  .exit-sug-card.premium_stop,
  .exit-sug-card.iv_crush { border-color: var(--red); background: rgba(255,71,87,0.08); box-shadow: 0 0 6px rgba(255,71,87,0.2); }
  .exit-sug-card.premium_target,
  .exit-sug-card.premium_trail { border-color: var(--green); background: rgba(0,214,143,0.07); }
  .exit-trigger-badge {
    font-size: 9px; font-weight: 700; padding: 2px 6px;
    letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid currentColor;
  }
  .exit-trigger-badge.premium_stop, .exit-trigger-badge.iv_crush { color: var(--red); }
  .exit-trigger-badge.premium_target, .exit-trigger-badge.premium_trail { color: var(--green); }
  .exit-trigger-badge.time_stop, .exit-trigger-badge.eod_squareoff,
  .exit-trigger-badge.regime_flip { color: var(--amber); }
  .exit-dismiss {
    padding: 3px 8px; background: transparent; color: var(--text-dim);
    border: 1px solid var(--line-bright);
    font-family: var(--mono); font-size: 10px; cursor: pointer;
    transition: all 0.15s;
  }
  .exit-dismiss:hover { border-color: var(--red); color: var(--red); }
  #toast {
    position: fixed; top: 60px; right: 20px;
    background: var(--bg-elev-2); border: 1px solid var(--green);
    padding: 10px 16px; font-size: 11px; color: var(--green);
    z-index: 200; animation: slideIn 0.3s ease; max-width: 360px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="brand">OPT<span>.</span>SCAN</div>
  <nav>
    <a href="/" class="active">Scanner</a>
    <a href="/journal">Journal</a>
  </nav>
  <div class="status-row">
    <div class="live-pulse"><span class="pulse-dot"></span><span id="liveStatus">LIVE · scanning every 30s</span></div>
    <div class="footer-meta">
      <div class="meta-item">last scan <span id="lastScan">--:--:--</span></div>
      <div class="meta-item">setups today <span id="setupCount">0</span></div>
    </div>
  </div>
</header>

<div class="positions-bar" id="positionsBar"></div>

<!-- Suggestion tray: hidden when empty, appears above scanner panels when signals fire -->
<div class="suggestion-tray" id="suggestionTray" style="display:none;">

  <div class="tray-section" id="pendingSugSection">
    <div class="tray-section-label">
      Pending Approvals
      <span class="tray-count" id="pendingSugCount">0</span>
    </div>
    <div class="suggestions-scroll" id="suggestionsContainer"></div>
  </div>

  <div class="tray-section" id="gatePosSec" style="display:none;">
    <div class="tray-section-label">Gate Positions</div>
    <div class="gate-positions-row" id="gatePositionsRow"></div>
  </div>

  <div class="tray-section" id="conflictSec" style="display:none;">
    <div class="tray-section-label">Reversal Conflicts</div>
    <div class="conflict-row" id="conflictRow"></div>
  </div>

  <div class="tray-section" id="exitSugSec" style="display:none;">
    <div class="tray-section-label">Exit Signals</div>
    <div class="exit-sug-row" id="exitSugRow"></div>
  </div>

</div>

<div id="toast"></div>

<main id="mainGrid">
  <div class="panel" data-index="NIFTY">
    <div class="panel-header">
      <div class="panel-title">NIFTY</div>
      <div class="panel-spot" data-spot>--</div>
    </div>
    <div class="context-grid" data-context></div>
    <div class="section-label"><span>SETUPS</span><span data-setup-count>0</span></div>
    <div data-setups></div>
  </div>

  <div class="panel" data-index="BANKNIFTY">
    <div class="panel-header">
      <div class="panel-title">BANKNIFTY</div>
      <div class="panel-spot" data-spot>--</div>
    </div>
    <div class="context-grid" data-context></div>
    <div class="section-label"><span>SETUPS</span><span data-setup-count>0</span></div>
    <div data-setups></div>
  </div>

</main>

<div class="exit-alerts-bar" id="exitAlerts"></div>

<script>
const API = window.location.origin;

function fmt(v, decimals = 2) {
  if (v == null || v === undefined) return '--';
  if (typeof v === 'number') return v.toFixed(decimals);
  return v;
}

function ivRegimeClass(regime) {
  return { cheap: 'green', expensive: 'red', neutral: 'amber' }[regime] || 'dim';
}

function renderContext(ctxEl, ctx) {
  if (!ctx) { ctxEl.innerHTML = ''; return; }
  ctxEl.innerHTML = `
    <div class="ctx-cell">
      <div class="ctx-label">IV Regime</div>
      <div class="ctx-value ${ivRegimeClass(ctx.iv_regime)}">${ctx.iv_regime || '--'} (${fmt(ctx.iv_percentile, 0)}%)</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">PCR</div>
      <div class="ctx-value ${ctx.pcr > 1.2 ? 'red' : ctx.pcr < 0.8 ? 'green' : ''}">${fmt(ctx.pcr)}</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">Max Pain</div>
      <div class="ctx-value">${ctx.max_pain || '--'}</div>
    </div>
    <div class="ctx-cell">
      <div class="ctx-label">OI Signal</div>
      <div class="ctx-value ${ctx.oi_signal?.signal === 'bullish' ? 'green' : ctx.oi_signal?.signal === 'bearish' ? 'red' : 'dim'}">${ctx.oi_signal?.signal || 'neutral'}</div>
    </div>
    <div class="ctx-cell" style="grid-column: 1 / -1;">
      <div class="ctx-label">TradingView</div>
      <div class="ctx-value ${ctx.tv_signal ? 'amber' : 'dim'}">${ctx.tv_signal || 'no recent signal'}</div>
    </div>
  `;
}

function renderSetups(setupsEl, setups, health) {
  const hs = health?.state;
  if (hs === 'error') {
    setupsEl.innerHTML = `<div class="empty error-state">data error · ${health.reason || 'check server logs'}</div>`;
    return;
  }
  if (hs === 'degraded') {
    setupsEl.innerHTML = `<div class="empty paused">entries paused · ${health.reason || 'system degraded'}</div>`;
    return;
  }
  if (!setups || setups.length === 0) {
    setupsEl.innerHTML = `<div class="empty">No qualifying setups · waiting for confluence</div>`;
    return;
  }
  setupsEl.innerHTML = setups.map(s => `
    <div class="setup-card ${s.direction}">
      <div class="setup-head">
        <div class="setup-strike">${s.strike}<span class="type ${s.type}">${s.type}</span></div>
        <div class="setup-ltp">₹${fmt(s.ltp)}</div>
      </div>
      <div class="greeks-row">
        <div class="greek"><div class="greek-label">Δ delta</div><div class="greek-value">${fmt(s.delta, 3)}</div></div>
        <div class="greek"><div class="greek-label">Γ gamma</div><div class="greek-value">${fmt(s.gamma, 4)}</div></div>
        <div class="greek"><div class="greek-label">Θ theta</div><div class="greek-value">${fmt(s.theta)}</div></div>
        <div class="greek"><div class="greek-label">IV</div><div class="greek-value">${fmt(s.iv)}%</div></div>
      </div>
      <div class="targets">
        <div class="t-sl">SL: ₹${fmt(s.suggested_sl)}</div>
        <div class="t-target">T1: ₹${fmt(s.suggested_target_1)}</div>
        <div class="t-target">T2: ₹${fmt(s.suggested_target_2)}</div>
      </div>
      <div class="reasons">${(s.reasons || []).map(r => `<span>${r}</span>`).join('')}</div>
    </div>
  `).join('');
}

async function refresh() {
  try {
    const res = await fetch(`${API}/api/scan`);
    const data = await res.json();
    let totalSetups = 0;

    document.querySelectorAll('.panel').forEach(panel => {
      const idx = panel.dataset.index;
      const scan = data[idx];
      if (!scan) return;

      panel.querySelector('[data-spot]').textContent = fmt(scan.spot, 0);
      renderContext(panel.querySelector('[data-context]'), scan.market_context);
      renderSetups(panel.querySelector('[data-setups]'), scan.setups, scan.health);
      const count = (scan.setups || []).length;
      panel.querySelector('[data-setup-count]').textContent = count;
      totalSetups += count;
    });

    document.getElementById('setupCount').textContent = totalSetups;
    document.getElementById('lastScan').textContent = new Date().toLocaleTimeString();

    // Update header pulse dot and status text based on aggregate health across all indices.
    const allScans = Object.values(data);
    const dot = document.querySelector('.pulse-dot');
    if (allScans.some(d => d.health?.state === 'error')) {
      dot.className = 'pulse-dot error';
      document.getElementById('liveStatus').textContent = 'ERROR · check server logs';
    } else if (allScans.some(d => d.health?.state === 'degraded')) {
      const first = allScans.find(d => d.health?.state === 'degraded');
      dot.className = 'pulse-dot degraded';
      document.getElementById('liveStatus').textContent = `DEGRADED · ${first.health.reason}`;
    } else {
      dot.className = 'pulse-dot';
      document.getElementById('liveStatus').textContent = 'LIVE · scanning every 30s';
    }

    // positions
    const posRes = await fetch(`${API}/api/positions`);
    const positions = await posRes.json();
    const posBar = document.getElementById('positionsBar');
    if (!positions.length) {
      posBar.innerHTML = '<div style="color: var(--text-dim); font-size: 11px;">No open positions · register a trade via /api/position/add</div>';
    } else {
      posBar.innerHTML = positions.map(p => {
        const pnlPct = ((p.current_price - p.entry_price) / p.entry_price * 100).toFixed(1);
        const cls = pnlPct > 0 ? 'pos' : 'neg';
        return `<div class="pos-pill">
          <span><strong>${p.index}</strong> ${p.strike}${p.option_type}</span>
          <span style="color: var(--text-dim);">@ ₹${fmt(p.entry_price)}</span>
          <span class="pos-pnl ${cls}">${pnlPct > 0 ? '+' : ''}${pnlPct}%</span>
          <span style="color: var(--amber);">peak +${fmt(p.peak_pct, 1)}%</span>
          ${p.locked_profit_pct > 0 ? `<span style="color: var(--green);">🔒 +${p.locked_profit_pct}%</span>` : ''}
        </div>`;
      }).join('');
    }

    // exit alerts
    const alertsRes = await fetch(`${API}/api/exit-alerts`);
    const alerts = await alertsRes.json();
    const alertBar = document.getElementById('exitAlerts');
    alertBar.innerHTML = alerts.slice(-5).map(a => `
      <div class="exit-alert ${a.urgency}">
        <span class="alert-contract">${a.index} ${a.contract}</span>
        <span class="alert-pnl ${a.pnl_pct > 0 ? 'pos' : 'neg'}">${a.pnl_pct > 0 ? '+' : ''}${a.pnl_pct}%</span>
        <span class="alert-msg">${a.message}</span>
      </div>
    `).join('');

    // gate-layer suggestions (has its own error handling)
    await loadSuggestions();
  } catch (e) {
    document.getElementById('liveStatus').textContent = 'OFFLINE · check server';
  }
}

// ===== SUGGESTION TRAY =====
const LOT_SIZES = { NIFTY: 75, BANKNIFTY: 30 };
const TRIGGER_LABELS = {
  premium_stop: 'SL HIT', premium_target: 'TARGET', premium_trail: 'TRAIL',
  time_stop: 'TIME STOP', iv_crush: 'IV CRUSH',
  regime_flip: 'REGIME FLIP', eod_squareoff: 'EOD',
};

function fmtTime(dtStr) {
  if (!dtStr) return '--';
  const d = new Date(dtStr.includes('T') ? dtStr : dtStr.replace(' ', 'T'));
  return isNaN(d) ? '--' : d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function heldMin(isoStr) {
  if (!isoStr) return '--';
  const d = new Date(isoStr);
  return isNaN(d) ? '--' : Math.floor((Date.now() - d) / 60000) + 'm';
}

function ivDisplay(iv) {
  if (iv == null) return '--';
  return (iv > 1 ? iv : iv * 100).toFixed(1) + '%';
}

function renderSuggestions(suggs) {
  const section = document.getElementById('pendingSugSection');
  const container = document.getElementById('suggestionsContainer');
  if (!suggs.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  document.getElementById('pendingSugCount').textContent = suggs.length;
  container.innerHTML = suggs.map(s => {
    const dir = s.option_type === 'CE' ? 'bullish' : 'bearish';
    const lotSz = LOT_SIZES[s.sym] || '?';
    return `
    <div class="suggestion-card ${dir}" id="sug-${s.id}">
      <div class="sug-header">
        <span class="sug-sym">${s.sym}</span>
        <span class="sug-regime ${s.regime || 'ranging'}">${s.regime || '--'}</span>
        <span class="sug-time">${fmtTime(s.created_at)}</span>
      </div>
      <div class="sug-contract">
        ${s.strike}<span class="type ${s.option_type}">${s.option_type}</span>
        <span class="sug-expiry">${s.expiry}</span>
      </div>
      <div class="sug-grid">
        <div class="sug-cell"><div class="sug-label">Entry</div><div class="sug-value entry">₹${fmt(s.entry_premium)}</div></div>
        <div class="sug-cell"><div class="sug-label">Stop</div><div class="sug-value stop">₹${fmt(s.stop_premium)}</div></div>
        <div class="sug-cell"><div class="sug-label">Target</div><div class="sug-value target">₹${fmt(s.target_premium)}</div></div>
        <div class="sug-cell"><div class="sug-label">Lots</div><div class="sug-value">${s.lots} × ${lotSz}</div></div>
        <div class="sug-cell"><div class="sug-label">Delta</div><div class="sug-value">${fmt(Math.abs(s.delta || 0), 2)}</div></div>
        <div class="sug-cell"><div class="sug-label">IV</div><div class="sug-value">${ivDisplay(s.iv)}</div></div>
      </div>
      <div class="sug-rationale">${s.rationale || ''}</div>
      <div class="sug-actions">
        <button class="sug-approve" onclick="approveSuggestion(${s.id})">✓ APPROVE</button>
        <button class="sug-reject"  onclick="rejectSuggestion(${s.id})">✗ REJECT</button>
      </div>
    </div>`;
  }).join('');
}

function renderGatePositions(positions) {
  const sec = document.getElementById('gatePosSec');
  const row = document.getElementById('gatePositionsRow');
  if (!positions.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  row.innerHTML = positions.map(p => {
    const dir = p.option_type === 'CE' ? 'bullish' : 'bearish';
    const peakPct = p.entry_premium > 0
      ? ((p.peak_premium - p.entry_premium) / p.entry_premium * 100).toFixed(1)
      : null;
    return `<div class="gate-pos-pill ${dir}">
      <strong>${p.sym} ${p.strike}<span class="type ${p.option_type}" style="margin-left:3px;">${p.option_type}</span></strong>
      <span>@ ₹${fmt(p.entry_premium)}</span>
      ${peakPct !== null && peakPct > 0 ? `<span style="color:var(--green);">peak +${peakPct}%</span>` : ''}
      <span class="gate-pos-held">${heldMin(p.entry_time)} held</span>
      <span style="color:var(--text-dim);">stop ₹${fmt(p.stop_premium)}</span>
    </div>`;
  }).join('');
}

function renderExitSuggestions(exitSigs) {
  const sec = document.getElementById('exitSugSec');
  const row = document.getElementById('exitSugRow');
  if (!exitSigs.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  row.innerHTML = exitSigs.map(e => {
    const pnlSign = e.pnl_pct >= 0 ? '+' : '';
    const pnlColor = e.pnl_pct >= 0 ? 'var(--green)' : 'var(--red)';
    const trigLabel = TRIGGER_LABELS[e.trigger] || e.trigger.toUpperCase();
    return `<div class="exit-sug-card ${e.trigger}">
      <span class="exit-trigger-badge ${e.trigger}">${trigLabel}</span>
      <strong>${e.sym} ${e.strike}<span class="type ${e.option_type}" style="margin-left:3px;">${e.option_type}</span></strong>
      <span style="color:${pnlColor};font-weight:600;">${pnlSign}${fmt(e.pnl_pct, 1)}%</span>
      <span style="color:var(--text-dim);">@ ₹${fmt(e.current_premium)}</span>
      <button class="exit-dismiss" onclick="dismissExitSuggestion(${e.id})">dismiss</button>
    </div>`;
  }).join('');
}

function renderConflicts(conflicts) {
  const sec = document.getElementById('conflictSec');
  const row = document.getElementById('conflictRow');
  if (!conflicts.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  row.innerHTML = conflicts.map(c => {
    const arrow = c.new_dir === 'long' ? '↑ LONG' : '↓ SHORT';
    return `<div class="conflict-card">
      <span class="conflict-badge">⚡ REVERSAL</span>
      <div class="conflict-body">
        <div class="conflict-title">${c.sym} — ${arrow} signal fired while ${c.existing_option_type} is open</div>
        <div class="conflict-detail">
          Existing: ${c.existing_position_id} · New: ${c.new_option_type} ·
          Regime: ${c.regime} · Filters: ${c.filters}/12 ·
          ${fmtTime(c.signal_time)}
        </div>
        <div class="conflict-detail" style="color:var(--amber);">
          Review and close the open position before approving a ${c.new_option_type} entry.
        </div>
      </div>
      <button class="exit-dismiss" onclick="dismissConflict('${c.sym}')">dismiss</button>
    </div>`;
  }).join('');
}

async function dismissConflict(sym) {
  try {
    await fetch(`${API}/api/position-conflict/${sym}/dismiss`, { method: 'POST' });
    await loadSuggestions();
  } catch (e) { /* silently ignore */ }
}

async function loadSuggestions() {
  try {
    const [suggs, positions, exitSigs, conflicts] = await Promise.all([
      fetch(`${API}/api/pending-suggestions`).then(r => r.json()),
      fetch(`${API}/api/active-positions`).then(r => r.json()),
      fetch(`${API}/api/pending-exit-suggestions`).then(r => r.json()),
      fetch(`${API}/api/position-conflicts`).then(r => r.json()),
    ]);
    renderSuggestions(suggs);
    renderGatePositions(positions);
    renderConflicts(conflicts);
    renderExitSuggestions(exitSigs);
    const tray = document.getElementById('suggestionTray');
    tray.style.display =
      (suggs.length || positions.length || exitSigs.length || conflicts.length)
        ? '' : 'none';
  } catch (e) {
    console.error('Suggestion tray:', e);
  }
}

async function approveSuggestion(id) {
  const card = document.getElementById(`sug-${id}`);
  if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }
  try {
    const r = await fetch(`${API}/api/suggestion/${id}/approve`, { method: 'POST' });
    if (!r.ok) { alert('Approve failed: ' + await r.text()); return; }
    const data = await r.json();
    showToast(`APPROVED — place order manually at suggested premium · ${data.position_id}`);
    await loadSuggestions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function rejectSuggestion(id) {
  const card = document.getElementById(`sug-${id}`);
  if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }
  try {
    await fetch(`${API}/api/suggestion/${id}/reject`, { method: 'POST' });
    await loadSuggestions();
  } catch (e) { /* silently ignore */ }
}

async function dismissExitSuggestion(id) {
  try {
    await fetch(`${API}/api/exit-suggestion/${id}/reject`, { method: 'POST' });
    await loadSuggestions();
  } catch (e) { /* silently ignore */ }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 5000);
}

refresh();
setInterval(refresh, 5000);
</script>
